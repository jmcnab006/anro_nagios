---
- name: NAGIOS-CMD | Install nagios-cmd helper
  ansible.builtin.copy:
    src: nagios-cmd
    dest: /usr/local/bin/nagios-cmd
    owner: root
    group: root
    mode: '0755'

- name: NAGIOS-CMD | Ensure custom Nagios object directories exist
  ansible.builtin.file:
    path: "{{ anro_nagios_config_path }}/objects/{{ item }}"
    state: directory
    owner: root
    group: "{{ anro_nagios_group | default('nagios') }}"
    mode: '0775'
  loop:
    - commands
    - contacts
    - hosts
    - hosts/default
    - templates
    - timeperiods

- name: NAGIOS-CMD | Ensure Nagios service definition directory exists
  ansible.builtin.file:
    path: "{{ anro_nagios_config_path }}/servicedefs"
    state: directory
    owner: root
    group: nagios
    mode: '0775'