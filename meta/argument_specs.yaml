---
argument_specs:
  main:
    short_description: "Install nagios4-core and configure a baseline for usage"
    description: >
      Installs nagios4-core from apt repository and customizes
    author: Jeremy McNab
    options:
      anro_nagios_install:
        type: "bool"
        default: true
        description: "Install nagios4 package"
      anro_nagios_user:
        type: "str"
        default: "nagios"
        description: "User to run the nagios user as"
      anro_nagios_group:
        type: "str"
        default: "nagios"
        description: "Group to run the nagios user as part of"
      anro_nagios_users:
        type: "list"
        default: []
        elements: 'dict'
        description: "List of users to add to nagios"
        options:
          name:
            type: 'str'
            description: "User name"
          password:
            type: 'str'
            description: "User password"
      anro_nagios_cgi_config:
        type: "dict"
