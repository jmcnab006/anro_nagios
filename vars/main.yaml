# These are the var defaults for core items. these are combined with other dicts or lists to create 'full' configs
anro_nagios_cgi_defaults:
  main_config_file: "{{ anro_nagios_config_file }}"
  physical_html_path: '/usr/share/nagios4/htdocs'
  url_html_path: '/nagios'
  show_context_help: 0
  use_pending_states: 1
  use_authentication: 1
  use_ssl_authentication: 0
  authorized_for_system_information: '*'
  authorized_for_configuration_information: '*'
  authorized_for_system_commands: '*'
  authorized_for_all_services: '*'
  authorized_for_all_hosts: '*'
  authorized_for_all_service_commands: '*'
  authorized_for_all_host_commands: '*'
  default_statusmap_layout: 10
  default_statuswrl_layout: 4
  ping_syntax: '/bin/ping -n -U -c 5 $HOSTADDRESS$'
  refresh_rate: 90
  result_limit: 100
  escape_html_tags: 1
  action_url_target: _blank
  notes_url_target: _blank
  lock_author_names: 1
  navbar_search_for_addresses: 1
  navbar_search_for_aliases: 1
  ack_no_sticky: 1

anro_nagios_config_defaults:
  log_file: /var/log/nagios4/nagios.log
  cfg_dir:
    - /etc/nagios-plugins/config
    - /etc/nagios4/conf.d
    - /etc/nagios4/objects
  object_cache_file: /var/lib/nagios4/objects.cache
  precached_object_file: /var/lib/nagios4/objects.precache
  resource_file: /etc/nagios4/resource.cfg
  status_file: /var/lib/nagios4/status.dat
  status_update_interval: 10
  nagios_user: nagios
  nagios_group: nagios
  check_external_commands: 1
  command_file: /var/lib/nagios4/rw/nagios.cmd
  lock_file: /var/run/nagios4/nagios4.pid
  temp_file: /var/lib/nagios4/nagios.tmp
  temp_path: /tmp
  event_broker_options: -1
  log_rotation_method: d
  log_archive_path: /var/log/nagios4/archives
  use_syslog: 1
  log_notifications: 1
  log_service_retries: 1
  log_host_retries: 1
  log_event_handlers: 1
  log_initial_states: 0
  log_current_states: 1
  log_external_commands: 1
  log_passive_checks: 1
  service_inter_check_delay_method: s
  max_service_check_spread: 30
  service_interleave_factor: s
  host_inter_check_delay_method: s
  max_host_check_spread: 30
  max_concurrent_checks: 0
  check_result_reaper_frequency: 10
  max_check_result_reaper_time: 30
  check_result_path: /var/lib/nagios4/spool/checkresults
  max_check_result_file_age: 3600
  cached_host_check_horizon: 15
  cached_service_check_horizon: 15
  enable_predictive_host_dependency_checks: 1
  enable_predictive_service_dependency_checks: 1
  soft_state_dependencies: 0
  auto_reschedule_checks: 0
  auto_rescheduling_interval: 30
  auto_rescheduling_window: 180
  service_check_timeout: 60
  host_check_timeout: 30
  event_handler_timeout: 30
  notification_timeout: 30
  ocsp_timeout: 5
  ochp_timeout: 5
  perfdata_timeout: 5
  retain_state_information: 1
  state_retention_file: /var/lib/nagios4/retention.dat
  retention_update_interval: 60
  use_retained_program_state: 1
  use_retained_scheduling_info: 1
  retained_host_attribute_mask: 0
  retained_service_attribute_mask: 0
  retained_process_host_attribute_mask: 0
  retained_process_service_attribute_mask: 0
  retained_contact_host_attribute_mask: 0
  retained_contact_service_attribute_mask: 0
  interval_length: 60
  check_for_updates: 1
  bare_update_check: 0
  use_aggressive_host_checking: 0
  execute_service_checks: 1
  accept_passive_service_checks: 1
  execute_host_checks: 1
  accept_passive_host_checks: 1
  enable_notifications: 1
  enable_event_handlers: 1
  process_performance_data: 0
  obsess_over_services: 0
  obsess_over_hosts: 0
  translate_passive_host_checks: 0
  passive_host_checks_are_soft: 0
  check_for_orphaned_services: 1
  check_for_orphaned_hosts: 1
  check_service_freshness: 1
  service_freshness_check_interval: 60
  service_check_timeout_state: c
  check_host_freshness: 0
  host_freshness_check_interval: 60
  additional_freshness_latency: 15
  enable_flap_detection: 1
  low_service_flap_threshold: 5.0
  high_service_flap_threshold: 20.0
  low_host_flap_threshold: 5.0
  high_host_flap_threshold: 20.0
  date_format: us
  illegal_object_name_chars: '`~!$%^&*|''"<>?,()='
  illegal_macro_output_chars: '`~$&|''"<>'
  use_regexp_matching: 0
  use_true_regexp_matching: 0
  admin_email: nagios@localhost
  admin_pager: pagenagios@localhost
  daemon_dumps_core: 0
  use_large_installation_tweaks: 0
  enable_environment_macros: 0
  debug_level: 0
  debug_verbosity: 1
  debug_file: /var/log/nagios4/nagios.debug
  max_debug_file_size: 1000000
  allow_empty_hostgroup_assignment: 0

anro_nagios_resource_defaults:
  $USER1$: /usr/lib/nagios/plugins
  $USER2$: /usr/lib/nagios/plugins/eventhandlers


anro_nagios_commands_defaults:
  - command_name: notify-host-by-email
    command_line: >
      /usr/bin/printf "%b" "***** Nagios *****\n\n
      Notification Type: $NOTIFICATIONTYPE$\n
      Host: $HOSTNAME$\n
      State: $HOSTSTATE$\n
      Address: $HOSTADDRESS$\n
      Info: $HOSTOUTPUT$\n\n
      Date/Time: $LONGDATETIME$\n"
      | /usr/bin/mail -s
      "** $NOTIFICATIONTYPE$ Host Alert: $HOSTNAME$ is $HOSTSTATE$ **"
      $CONTACTEMAIL$

  - command_name: notify-service-by-email
    command_line: >
      /usr/bin/printf "%b" "***** Nagios *****\n\n
      Notification Type: $NOTIFICATIONTYPE$\n
      Service: $SERVICEDESC$\n
      Host: $HOSTALIAS$\n
      Address: $HOSTADDRESS$\n
      State: $SERVICESTATE$\n
      Date/Time: $LONGDATETIME$\n
      Additional Info:\n
      $SERVICEOUTPUT$\n"
      | /usr/bin/mail -s "** $NOTIFICATIONTYPE$ Service Alert: $HOSTALIAS$/$SERVICEDESC$ is $SERVICESTATE$ **"
      $CONTACTEMAIL$

  - command_name: notify-service-by-sms
    command_line: >
      /usr/bin/printf "%b" "*** USI Monitor ***\n
      Notification Type: $NOTIFICATIONTYPE$\n
      Service: $SERVICEDESC$\n
      Host: $HOSTALIAS$\n
      Address: $HOSTADDRESS$\n
      State: $SERVICESTATE$\n
      Date/Time: $LONGDATETIME$\n
      Additional Info:\n
      $SERVICEOUTPUT$\n"
      | $USER1$/send_sms.sh $CONTACTPAGER$

  - command_name: check_local_disk
    command_line: >
      $USER1$/check_disk -w $ARG1$ -c $ARG2$ -p $ARG3$

  - command_name: check_local_load
    command_line: >
      $USER1$/check_load -w $ARG1$ -c $ARG2$

  - command_name: check_local_procs
    command_line: >
      $USER1$/check_procs -w $ARG1$ -c $ARG2$ -s $ARG3$

  - command_name: check_local_users
    command_line: >
      $USER1$/check_users -w $ARG1$ -c $ARG2$

  - command_name: check_local_swap
    command_line: >
      $USER1$/check_swap -w $ARG1$ -c $ARG2$

  - command_name: check_local_mrtgtraf
    command_line: >
      $USER1$/check_mrtgtraf -F $ARG1$ -a $ARG2$ -w $ARG3$ -c $ARG4$ -e $ARG5$

  - command_name: check_mysql_query
    command_line: >
      $USER1$/check_mysql_query --hostname $HOSTADDRESS$ $ARG1$

  - command_name: check_dummy
    command_line: >
      $USER1$/check_dummy $ARG1$ $ARG2$

  - command_name: check_cert
    command_line: >
      $USER1$/check_http -H $HOSTADDRESS$ -S -I $HOSTADDRESS$ -p $ARG1$ -C $ARG2$

  # yamllint disable rule:line-length
  - command_name: process-host-perfdata
    command_line: >-
      /usr/bin/printf "%b" "$LASTHOSTCHECK$\t$HOSTNAME$\t$HOSTSTATE$\t$HOSTATTEMPT$\t$HOSTSTATETYPE$\t$HOSTEXECUTIONTIME$\t$HOSTOUTPUT$\t$HOSTPERFDATA$\n" >> /var/lib/nagios4/host-perfdata.out

  - command_name: process-service-perfdata
    command_line: >-
      /usr/bin/printf "%b" "$LASTSERVICECHECK$\t$HOSTNAME$\t$SERVICEDESC$\t$SERVICESTATE$\t$SERVICEATTEMPT$\t$SERVICESTATETYPE$\t$SERVICEEXECUTIONTIME$\t$SERVICELATENCY$\t$SERVICEOUTPUT$\t$SERVICEPERFDATA$\n" >> /var/lib/nagios4/service-perfdata.out
  # yamllint enable rule:line-length

anro_nagios_contacts_defaults:
  - contact_name: 'nagiosadmin'
    use: 'generic-contact'
    alias: 'Nagios Admin'
    email: 'nagios@localhost'

  - contact_name: 'noemail'
    use: 'generic-contact'
    alias: 'noemail'

anro_nagios_contactgroups_defaults:
  - contactgroup_name: 'admins'
    alias: 'Nagios Admin'
    members: 'nagiosadmin'

anro_nagios_host_templates_defaults:
  - name: 'generic-host'
    check_command: 'check-host-alive!!!!!!!!'
    notifications_enabled: 1
    event_handler_enabled: 1
    flap_detection_enabled: 1
    process_perf_data: 1
    retain_status_information: 1
    retain_nonstatus_information: 1
    max_check_attempts: 3
    check_interval: 1
    retry_interval: 1
    check_period: '24x7'
    contacts: 'noemail'
    notification_interval: 60
    notification_period: '24x7'
    statusmap_image: "tag2.gd2"
    register: 0

  - name: 'linux-server'
    use: 'generic-host'
    check_period: '24x7'
    check_interval: 5
    retry_interval: 1
    max_check_attempts: 10
    check_command: 'check-host-alive'
    notification_period: 'workhours'
    notification_interval: 120
    notification_options: 'd,u,r'
    contacts: 'noemail'
    register: 0

anro_nagios_contact_templates_defaults:
  - name: 'generic-contact'
    service_notification_period: '24x7'
    host_notification_period: '24x7'
    service_notification_options: 'w,u,c,r,f,s'
    host_notification_options: 'd,u,r,f,s'
    service_notification_commands: 'notify-service-by-email'
    host_notification_commands: 'notify-host-by-email'
    register: 0

anro_nagios_contactgroup_templates_defaults: []

anro_nagios_service_templates_defaults:
  - name: 'generic-service'
    active_checks_enabled: 1
    passive_checks_enabled: 1
    parallelize_check: 1
    obsess_over_service: 1
    check_freshness: 0
    notifications_enabled: 1
    event_handler_enabled: 1
    flap_detection_enabled: 1
    process_perf_data: 1
    retain_status_information: 1
    retain_nonstatus_information: 1
    is_volatile: 0
    check_period: '24x7'
    max_check_attempts: 3
    check_interval: 1
    retry_interval: 1
    contacts: 'noemail'
    notification_options: 'w,u,c,r'
    notification_interval: 60
    notification_period: '24x7'
    register: 0

  - name: 'local-service'
    use: 'generic-service'
    max_check_attempts: 4
    check_interval: 5
    retry_interval: 1
    register: 0

  - name: 'disk-service'
    use: 'generic-service'
    max_check_attempts: 5
    check_interval: 5
    retry_interval: 1
    contacts: 'noemail'
    register: 0

  - name: 'cisco-service'
    active_checks_enabled: 1
    passive_checks_enabled: 1
    parallelize_check: 1
    obsess_over_service: 1
    check_freshness: 0
    notifications_enabled: 1
    event_handler_enabled: 1
    flap_detection_enabled: 1
    process_perf_data: 1
    retain_status_information: 1
    retain_nonstatus_information: 1
    is_volatile: 0
    check_period: '24x7'
    contact_groups: 'admins'
    max_check_attempts: 5
    check_interval: 5
    retry_interval: 1
    contacts: 'noemail'
    notification_options: 'w,u,c,r'
    notification_interval: 60
    notification_period: '24x7'
    register: 0

anro_nagios_timeperiod_templates_defaults:
  - name: '24x7'
    timeperiod_name: '24x7'
    alias: '24 Hours A Day 7 Days A Week'
    sunday: '00:00-24:00'
    monday: '00:00-24:00'
    tuesday: '00:00-24:00'
    wednesday: '00:00-24:00'
    thursday: '00:00-24:00'
    friday: '00:00-24:00'
    saturday: '00:00-24:00'

  - name: 'workhours'
    timeperiod_name: 'workhours'
    alias: 'Normal Work Hours'
    monday: '07:00-19:00'
    tuesday: '07:00-19:00'
    wednesday: '07:00-19:00'
    thursday: '07:00-19:00'
    friday: '07:00-19:00'

  - name: 'none'
    timeperiod_name: 'none'
    alias: 'No Time Is A Good Time'
